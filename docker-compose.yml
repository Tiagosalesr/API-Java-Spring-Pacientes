version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_poc
    environment:
      POSTGRES_USER: tiago
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: api_poc_sobrevidas_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: